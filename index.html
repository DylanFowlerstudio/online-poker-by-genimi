<div id="game-board">
  <div id="community-cards"></div>
  <div id="player-hand"></div>
  <div id="controls">
    <button onclick="sendAction('fold')">Fold</button>
    <button onclick="sendAction('call')">Call</button>
    <input type="number" id="bet-amount" placeholder="Amount">
    <button onclick="sendAction('bet')">Bet</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  // Listen for updates from the server
  socket.on('update_table', (data) => {
    document.getElementById('community-cards').innerText = data.community.join(' | ');
    document.getElementById('player-hand').innerText = data.myCards.join(' | ');
  });

  function sendAction(type) {
    const amount = document.getElementById('bet-amount').value;
    socket.emit('player_move', { type, amount });
  }
</script>
