<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multiplayer Poker</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="app">
    <header>
      <h1>🃏 Texas Hold'em Multiplayer</h1>
      <p class="subtitle">Java + HTML + WebSockets</p>
    </header>

    <section class="join-panel">
      <input id="nameInput" type="text" placeholder="Enter your name" />
      <button onclick="joinGame()">Join Game</button>
      <button onclick="startGame()">Start Game</button>
    </section>

    <section class="status-bar">
      <div><strong>Phase:</strong> <span id="phase">WAITING</span></div>
      <div><strong>Pot:</strong> $<span id="pot">0</span></div>
      <div><strong>Highest Bet:</strong> $<span id="highestBet">0</span></div>
      <div><strong>Status:</strong> <span id="message">Waiting for players...</span></div>
    </section>

    <section class="table">
      <div class="community-section">
        <h2>Community Cards</h2>
        <div id="communityCards" class="cards"></div>
      </div>

      <div class="your-hand-section">
        <h2>Your Hand</h2>
        <div id="yourHand" class="cards"></div>
      </div>
    </section>

    <section class="players-section">
      <h2>Players</h2>
      <div id="playersList" class="players-list"></div>
    </section>

    <section class="actions">
      <button onclick="sendAction('CHECK')">Check</button>
      <button onclick="sendAction('CALL')">Call</button>
      <input type="number" id="raiseAmount" placeholder="Raise amount" min="1" />
      <button onclick="raiseAction()">Raise</button>
      <button onclick="sendAction('FOLD')">Fold</button>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
